<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --cream:#FBF3E4; --peach:#F7C9B6; --rose:#E8889B; --sage:#A7C4A0; --sky:#9CC3D5; --butter:#F4D06F; --ink:#4A3B47; --inkSoft:#7A6A75; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); font-family:'Nunito',sans-serif; color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }
  h1,h2,h3 { font-family:'Fraunces',serif; font-weight:600; }
  .deco { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
  .deco span { position:absolute; font-size:28px; opacity:.12; }
  @keyframes float0 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px) rotate(8deg)} }
  @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-22px) rotate(-6deg)} }
  @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .wrap { max-width:480px; margin:0 auto; padding:0 20px 60px; position:relative; z-index:2; }
  .back { display:inline-block; padding:14px 0 0; font-size:13px; font-weight:700; color:var(--inkSoft); text-decoration:none; letter-spacing:1px; }
  .hdr { text-align:center; padding:14px 0 20px; }
  .card { background:#fff; border-radius:28px; padding:28px 24px; box-shadow:0 16px 40px rgba(74,59,71,.1); border:2px solid var(--peach); }
  .btn { display:block; width:100%; padding:15px 32px; border-radius:999px; border:none; font-size:16px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; color:#fff; transition:transform .15s; text-align:center; }
  .btn:active { transform:scale(.96); }
  .btn:disabled { opacity:.5; cursor:default; transform:none; }
  .btn-rose { background:var(--rose); box-shadow:0 8px 20px rgba(232,136,155,.4); }
  .btn-sky  { background:var(--sky);  box-shadow:0 8px 20px rgba(156,195,213,.4); }
  .btn-sage { background:var(--sage); box-shadow:0 8px 20px rgba(167,196,160,.4); }
  .name-input { width:100%; padding:14px 18px; border-radius:16px; border:2px solid var(--peach); font-size:17px; font-family:'Nunito',sans-serif; font-weight:700; color:var(--ink); background:var(--cream); text-align:center; margin-bottom:14px; }
  .name-input:focus { outline:none; border-color:var(--rose); }

  /* Quiz screen */
  .progress-wrap { margin-bottom:16px; }
  .progress-label { display:flex; justify-content:space-between; font-size:13px; font-weight:700; color:var(--inkSoft); margin-bottom:6px; }
  .progress-bar { height:6px; background:var(--peach); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--rose); border-radius:99px; transition:width .4s ease; }

  .timer-wrap { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:18px; }
  .timer-ring { width:52px; height:52px; flex-shrink:0; }
  .timer-ring circle { fill:none; stroke-width:5; }
  .timer-track { stroke:var(--peach); }
  .timer-arc { stroke:var(--rose); stroke-linecap:round; transition:stroke-dashoffset .9s linear, stroke .3s; transform-origin:center; transform:rotate(-90deg); }
  .timer-num { font-family:'Fraunces',serif; font-size:18px; font-weight:600; color:var(--ink); }

  .question-text { font-family:'Fraunces',serif; font-size:21px; font-weight:600; line-height:1.35; margin-bottom:22px; text-align:center; }
  .answer-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px; }
  .ans-btn { padding:14px 10px; border-radius:18px; border:2px solid var(--peach); background:#fff; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; color:var(--ink); cursor:pointer; transition:transform .1s, background .15s, border-color .15s; line-height:1.3; text-align:center; }
  .ans-btn:active { transform:scale(.96); }
  .ans-btn.selected { border-color:var(--sky); background:#e8f4fa; }
  .ans-btn.correct  { border-color:var(--sage); background:#e6f5e4; color:#2a6b25; }
  .ans-btn.wrong    { border-color:var(--rose); background:#fce8ec; color:#a0283a; }
  .ans-btn.reveal   { border-color:var(--sage); background:#e6f5e4; color:#2a6b25; }
  .ans-btn:disabled { cursor:default; transform:none; }

  .feedback { text-align:center; font-size:15px; font-weight:800; min-height:22px; margin-top:12px; }
  .feedback.ok  { color:var(--sage); }
  .feedback.bad { color:var(--rose); }

  /* Score pill */
  .score-pill { display:inline-flex; align-items:center; gap:6px; background:var(--butter); color:var(--ink); border-radius:999px; padding:5px 14px; font-size:14px; font-weight:800; }

  /* Results */
  .result-score { font-family:'Fraunces',serif; font-size:52px; font-weight:600; text-align:center; line-height:1; }
  .result-label { text-align:center; color:var(--inkSoft); font-size:14px; margin-top:4px; margin-bottom:24px; }

  /* Leaderboard */
  .board { margin-top:16px; }
  .board-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:14px; margin-bottom:6px; background:var(--cream); }
  .board-row.me { background:#F7C9B655; border:2px solid var(--rose); }
  .board-rank { font-size:18px; min-width:28px; }
  .board-name { flex:1; font-weight:700; font-size:15px; }
  .board-score { font-weight:800; font-size:17px; color:var(--sky); }
  .board-empty { color:var(--inkSoft); font-size:14px; text-align:center; padding:12px 0; }
  .db-error { background:#fee; border:1px solid #fcc; border-radius:12px; padding:10px 14px; font-size:12px; color:#c00; margin-top:8px; }

  @keyframes pop { 0%{opacity:0;transform:scale(.92)} 100%{opacity:1;transform:scale(1)} }
  .pop { animation:pop .3s ease both; }

  /* Screens */
  .screen { display:none; }
  .screen.active { display:block; }
</style>
</head>
<body>
<div class="deco" id="deco"></div>
<div class="wrap">
  <a class="back" href="/">← Avaleht</a>
  <div class="hdr">
    <h1 style="font-size:40px;letter-spacing:-1px">beebi<span style="color:var(--rose)">bet</span></h1>
    <p style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--inkSoft);font-weight:700;margin-top:3px">BeebiQuiz</p>
  </div>

  <!-- Start screen -->
  <div class="screen active" id="screenStart">
    <div class="card pop" style="text-align:center">
      <div style="font-size:56px;margin-bottom:12px">🦉</div>
      <h2 style="font-size:26px;margin-bottom:8px">BeebiQuiz</h2>
      <p style="color:var(--inkSoft);font-size:14px;line-height:1.6;margin-bottom:24px">10 juhuslikku küsimust beebi arengu, hoolduse ja keha kohta.<br>Kiirus loeb — kiirema vastuse eest saad rohkem punkte!</p>
      <input class="name-input" id="nameInput" placeholder="Sinu nimi" maxlength="24" autocomplete="off" />
      <button class="btn btn-rose" id="startBtn">Alusta mängu 🍼</button>
    </div>
    <div class="card pop" style="margin-top:14px">
      <h2 style="font-size:18px;margin-bottom:12px">🏆 Edetabel</h2>
      <div id="startBoard"><div class="board-empty">Laen…</div></div>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="screen" id="screenQuiz">
    <div class="card pop" id="quizCard">
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="qLabel">Küsimus 1 / 30</span>
          <div class="score-pill">⭐ <span id="liveScore">0</span></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>

      <div class="timer-wrap">
        <svg class="timer-ring" viewBox="0 0 52 52">
          <circle class="timer-track" cx="26" cy="26" r="22"/>
          <circle class="timer-arc" id="timerArc" cx="26" cy="26" r="22"
            stroke-dasharray="138.23" stroke-dashoffset="0"/>
        </svg>
        <span class="timer-num" id="timerNum">20</span>
      </div>

      <div class="question-text" id="questionText"></div>
      <div class="answer-grid" id="answerGrid"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- Results screen -->
  <div class="screen" id="screenResults">
    <div class="card pop">
      <div style="font-size:52px;text-align:center;margin-bottom:8px" id="resultEmoji">🎉</div>
      <div class="result-score" id="resultScore">0</div>
      <div class="result-label">punkti 10-st küsimusest</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:800;color:var(--sage)" id="resultCorrect">0</div>
          <div style="font-size:12px;color:var(--inkSoft)">õiget</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:800;color:var(--rose)" id="resultWrong">0</div>
          <div style="font-size:12px;color:var(--inkSoft)">valet</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:800;color:var(--butter)" id="resultSpeed">0</div>
          <div style="font-size:12px;color:var(--inkSoft)">kiirusbonus</div>
        </div>
      </div>
      <button class="btn btn-sage" onclick="location.reload()">Mängi uuesti →</button>
    </div>
    <div class="card pop" style="margin-top:14px">
      <h2 style="font-size:18px;margin-bottom:14px">🏆 Edetabel</h2>
      <div id="resultsBoard"><div class="board-empty">Laen…</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  "https://thrsacygpqwbnkcppmpk.supabase.co",
  "sb_publishable_-QaY7mGpitakhestu3w1fg_sCGquRvx"
);

const QUESTIONS = [
  { q:"Millises vanuses hakkab beebi tavaliselt pead kindlalt hoidma?", opts:["1 kuu","3–4 kuud","6 kuud","8 kuud"], ans:1 },
  { q:"Millal beebi tavaliselt istuma õpib (ilma toeta)?", opts:["4–5 kuud","6–8 kuud","9–10 kuud","12 kuud"], ans:1 },
  { q:"Esimesed sammud (kõndimine) algavad tavaliselt…", opts:["8–10 kuud","11–13 kuud","14–16 kuud","18+ kuud"], ans:1 },
  { q:"Millises vanuses ütleb beebi tavaliselt esimesed mõistetavad sõnad (\"ema\", \"isa\")?", opts:["6–8 kuud","9–12 kuud","12–15 kuud","18 kuud"], ans:1 },
  { q:"Beebi naeratab sotsiaalselt (reaktsioonina inimesele) tavaliselt alates…", opts:["2–3 nädalat","6–8 nädalat","4 kuud","6 kuud"], ans:1 },
  { q:"Millal hakkab beebi tavaliselt roomama?", opts:["4–5 kuud","7–10 kuud","12 kuud","14 kuud"], ans:1 },
  { q:"Millal hakkab beebi tavaliselt häälega naerma (mitte ainult naeratama)?", opts:["2 nädalat","3–4 kuud","6 kuud","9 kuud"], ans:1 },
  { q:"Millal areneb beebil pintsetihaare (väikese eseme võtmine pöidla ja nimetissõrmega)?", opts:["4 kuud","6 kuud","9–12 kuud","15 kuud"], ans:2 },
  { q:"Millal kaob vastsündinu astumisrefleks (jalgade liigutamine püsti hoides) tavaliselt?", opts:["~2 kuud","4 kuud","8 kuud","12 kuud"], ans:0 },
  { q:"Millal tipneb beebi lahusolekuärevus (nutab kui vanem lahkub)?", opts:["Sünnist saati","3 kuud","8–14 kuud","3 aastat"], ans:2 },
  { q:"Millal ilmuvad esimesed piimahambad tavaliselt?", opts:["2–3 kuud","6–10 kuud","12–14 kuud","16 kuud"], ans:1 },
  { q:"Mitu piimahammast tuleb lapsel kokku?", opts:["16","20","24","28"], ans:1 },
  { q:"Mis on beebi keskmine sünnikaal?", opts:["2,0 kg","2,5 kg","3,0–3,5 kg","4,5 kg"], ans:2 },
  { q:"Mis on vastsündinu keskmine pikkus sündides?", opts:["40 cm","48–52 cm","58 cm","62 cm"], ans:1 },
  { q:"Mitu korda kasvab beebi kaal tavaliselt esimese eluaasta jooksul?", opts:["2x","3x (kolmekordseks)","5x","10x"], ans:1 },
  { q:"Millises vanuses on beebi sünnikaal tavaliselt kahekordistunud?", opts:["2 kuud","4–6 kuud","9 kuud","12 kuud"], ans:1 },
  { q:"Vastsündinul on rohkem luid kui täiskasvanul. Umbes mitu?", opts:["150","206","~300","450"], ans:2 },
  { q:"Mitu peamist lõget (pehmet kohta) on beebi peas?", opts:["1","2","3","5"], ans:1 },
  { q:"Millal sulgub eesmine (suur) lõge tavaliselt?", opts:["2 kuud","6 kuud","9–18 kuud","3 aastat"], ans:2 },
  { q:"Mis värvi on paljude beebide silmad sündides (eriti heledanahalistel)?", opts:["Pruun","Roheline","Sinakas/hall","Must"], ans:2 },
  { q:"Millal stabiliseerub beebi lõplik silmavärv tavaliselt?", opts:["1 kuu","3 kuud","6–12 kuud","3 aastat"], ans:2 },
  { q:"Mis on kolostrum?", opts:["Beebi esimene väljaheide","Ema esimene, kollakas rinnapiim","Beebi nahakreem","Nabaväät"], ans:1 },
  { q:"Kuidas nimetatakse beebi esimest väljaheidet (tume, rohekas-must)?", opts:["Kolostrum","Mekoonium","Vernix","Laguun"], ans:1 },
  { q:"Mis on vernix (vernix caseosa)?", opts:["Valge rasvjas kate vastsündinu nahal","Esimene hammas","Nabarõngas","Refleks"], ans:0 },
  { q:"Mis refleks paneb vastsündinu sõrme ümber kõvasti haarama?", opts:["Moro refleks","Haaramisrefleks (palmar grasp)","Imemisrefleks","Astumisrefleks"], ans:1 },
  { q:"Mis on Moro refleks?", opts:["Imemine","Ehmatusrefleks (käte järsk laialiviskamine)","Naeratamine","Kõndimine"], ans:1 },
  { q:"Mitu märga mähet peaks tervel vastsündinul olema umbes ööpäevas?", opts:["1–2","3–4","6 või rohkem","12+"], ans:2 },
  { q:"Mitu tundi ööpäevas magab vastsündinu (0–3 kuud) tavaliselt?", opts:["8–10","11–13","14–17","20–22"], ans:2 },
  { q:"Mis vanuses soovitab WHO alustada lisatoidu (tahke toidu) andmist?", opts:["2 kuud","4 kuud","6 kuud","9 kuud"], ans:2 },
  { q:"Mitu hammast on beebil vaja, et alustada tahke toidu söömist?", opts:["0 — hambaid pole vaja","2","4","8"], ans:0 }
];

const TIMER_MAX = 20;
const CIRC = 2 * Math.PI * 22; // ~138.23

const QUIZ_SIZE = 10;
function pickQuestions() {
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, QUIZ_SIZE);
}

let ACTIVE_QUESTIONS = [];
let currentQ = 0;
let totalScore = 0;
let correctCount = 0;
let speedBonus = 0;
let playerName = "";
let timerInterval = null;
let timeLeft = TIMER_MAX;
let answered = false;

const screenStart   = document.getElementById("screenStart");
const screenQuiz    = document.getElementById("screenQuiz");
const screenResults = document.getElementById("screenResults");
const nameInput     = document.getElementById("nameInput");
const startBtn      = document.getElementById("startBtn");

function show(screen) {
  [screenStart, screenQuiz, screenResults].forEach(s => s.classList.remove("active"));
  screen.classList.add("active");
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// Timer arc
function setTimerArc(frac) {
  const arc = document.getElementById("timerArc");
  arc.style.strokeDashoffset = CIRC * (1 - frac);
  arc.style.stroke = frac > 0.4 ? "var(--rose)" : frac > 0.2 ? "var(--butter)" : "#e05";
}

function renderQuestion() {
  const data = ACTIVE_QUESTIONS[currentQ];
  answered = false;
  timeLeft = TIMER_MAX;

  document.getElementById("qLabel").textContent = `Küsimus ${currentQ + 1} / ${ACTIVE_QUESTIONS.length}`;
  document.getElementById("progressFill").style.width = `${(currentQ / ACTIVE_QUESTIONS.length) * 100}%`;
  document.getElementById("questionText").textContent = data.q;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("timerNum").textContent = TIMER_MAX;
  setTimerArc(1);

  const grid = document.getElementById("answerGrid");
  grid.innerHTML = "";
  data.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "ans-btn";
    btn.textContent = opt;
    btn.onclick = () => pickAnswer(i);
    grid.appendChild(btn);
  });

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timerNum").textContent = timeLeft;
    setTimerArc(timeLeft / TIMER_MAX);
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      revealTimeout();
    }
  }, 1000);
}

function pickAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const data = ACTIVE_QUESTIONS[currentQ];
  const correct = data.ans;
  const btns = document.getElementById("answerGrid").querySelectorAll(".ans-btn");
  btns.forEach(b => b.disabled = true);

  const isCorrect = idx === correct;
  btns[idx].classList.add(isCorrect ? "correct" : "wrong");
  if (!isCorrect) btns[correct].classList.add("reveal");

  const fb = document.getElementById("feedback");
  if (isCorrect) {
    const bonus = Math.round((timeLeft / TIMER_MAX) * 50);
    const pts = 100 + bonus;
    totalScore += pts;
    correctCount++;
    speedBonus += bonus;
    document.getElementById("liveScore").textContent = totalScore;
    fb.textContent = `✅ Õige! +${pts} punkti`;
    fb.className = "feedback ok";
  } else {
    fb.textContent = `❌ Vale. Õige: ${data.opts[correct]}`;
    fb.className = "feedback bad";
  }

  setTimeout(nextQuestion, 1600);
}

function revealTimeout() {
  if (answered) return;
  answered = true;
  const data = ACTIVE_QUESTIONS[currentQ];
  const btns = document.getElementById("answerGrid").querySelectorAll(".ans-btn");
  btns.forEach(b => b.disabled = true);
  btns[data.ans].classList.add("reveal");
  const fb = document.getElementById("feedback");
  fb.textContent = "⏱ Aeg sai läbi!";
  fb.className = "feedback bad";
  setTimeout(nextQuestion, 1600);
}

function nextQuestion() {
  currentQ++;
  if (currentQ < ACTIVE_QUESTIONS.length) {
    renderQuestion();
  } else {
    endQuiz();
  }
}

async function endQuiz() {
  clearInterval(timerInterval);
  show(screenResults);

  const wrongCount = ACTIVE_QUESTIONS.length - correctCount;
  document.getElementById("resultScore").textContent = totalScore;
  document.getElementById("resultCorrect").textContent = correctCount;
  document.getElementById("resultWrong").textContent = wrongCount;
  document.getElementById("resultSpeed").textContent = speedBonus;

  const pct = correctCount / ACTIVE_QUESTIONS.length;
  document.getElementById("resultEmoji").textContent =
    pct >= 0.9 ? "🏆" : pct >= 0.7 ? "🎉" : pct >= 0.5 ? "😊" : "📚";

  const { error } = await sb.from("quiz_scores").insert({ name: playerName, score: totalScore });
  const boardEl = document.getElementById("resultsBoard");
  if (error) {
    boardEl.innerHTML = `<div class="db-error">Salvestamine ebaõnnestus: ${esc(error.message)}</div>`;
    return;
  }
  await loadBoard(boardEl);
}

async function loadBoard(el) {
  const { data, error } = await sb.from("quiz_scores")
    .select("name,score")
    .order("score", { ascending: false })
    .limit(10);

  if (error) {
    el.innerHTML = `<div class="db-error">Laadimine ebaõnnestus: ${esc(error.message)}</div>`;
    return;
  }
  if (!data || !data.length) {
    el.innerHTML = '<div class="board-empty">Ole esimene edetabelis!</div>';
    return;
  }
  el.innerHTML = data.map((r, i) => {
    const me = r.name === playerName;
    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}.`;
    return `<div class="board-row${me ? " me" : ""}">
      <span class="board-rank">${medal}</span>
      <span class="board-name">${esc(r.name)}${me ? " ⬅ sina" : ""}</span>
      <span class="board-score">${r.score}</span>
    </div>`;
  }).join("");
}

startBtn.onclick = () => {
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); nameInput.style.borderColor = "var(--rose)"; return; }
  playerName = name;
  ACTIVE_QUESTIONS = pickQuestions();
  show(screenQuiz);
  renderQuestion();
};
nameInput.addEventListener("keydown", e => { if (e.key === "Enter") startBtn.click(); });

// Load start screen leaderboard
(async () => {
  await loadBoard(document.getElementById("startBoard"));
})();

// Decorative background
const d = document.getElementById("deco");
["🍼","👶","⭐","🎈","🌙","☁️"].forEach((e, i) => {
  const s = document.createElement("span");
  s.textContent = e;
